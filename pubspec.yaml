name: khateb_country_helper
description: >-
  A Flutter package for country selection with a beautiful bottom sheet,
  multilingual support (Arabic, English, Turkish), SVG flag images, also you can
  use this package as country flag helper and country code helper dial code and
  phone number validate.
version: 1.0.0
homepage: https://github.com/Mohammed-Khateb-github/khateb_country_helper
repository: https://github.com/Mohammed-Khateb-github/khateb_country_helper
issue_tracker: https://github.com/Mohammed-Khateb-github/khateb_country_helper/issues

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  jovial_svg: ^1.1.20

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  assets:
    - res/si/
